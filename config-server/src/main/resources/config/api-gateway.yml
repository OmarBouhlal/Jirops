# config-server/src/main/resources/config/api-gateway.yml
server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres-auth:5432/authdb
    username: authuser
    password: authpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/projects/**
        - id: planning-service
          uri: lb://planning-service
          predicates:
            - Path=/sprints/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
